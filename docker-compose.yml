version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vilpack}
    networks:
      - vilpack-network

  backend:
    build: ./vilpack-bot-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vilpack}
      PORT: 3001
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-vilpack2026}
      JWT_SECRET: ${JWT_SECRET:-supersecretvilpackkey2026}
    volumes:
      - ./uploads:/app/public/uploads
    depends_on:
      - db
    networks:
      - vilpack-network

  frontend:
    build: .
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - vilpack-network

volumes:
  postgres_data:

networks:
  vilpack-network:
