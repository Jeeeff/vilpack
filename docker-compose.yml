version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vilpack}
    networks:
      - vilpack-network

  backend:
    build: ./vilpack-bot-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-supersecretvilpackkey2026}
      ADMIN_USERS_JSON: ${ADMIN_USERS_JSON}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-vilpack}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-}
      ENABLE_WHATSAPP_PANEL: ${ENABLE_WHATSAPP_PANEL:-false}
      ENABLE_EVOLUTION_WEBHOOKS: ${ENABLE_EVOLUTION_WEBHOOKS:-false}
      ADMIN_REALTIME_ENABLED: ${ADMIN_REALTIME_ENABLED:-false}
    volumes:
      - ./uploads:/app/public/uploads
    depends_on:
      - db
    networks:
      - vilpack-network

  frontend:
    build: .
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - vilpack-network

volumes:
  postgres_data:

networks:
  vilpack-network:
