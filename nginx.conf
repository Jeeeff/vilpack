server {
    listen 80;
    server_name vilpack.com www.vilpack.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vilpack.com www.vilpack.com;

    ssl_certificate /etc/letsencrypt/live/vilpack.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vilpack.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Gemini AI pode demorar — aumenta timeouts para evitar 504
        proxy_connect_timeout       10s;
        proxy_send_timeout          120s;
        proxy_read_timeout          120s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
